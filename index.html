<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Webhook Manager</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

        :root {
            --bg: #0b1020;
            --panel: rgba(15, 23, 42, 0.82);
            --line: rgba(148, 163, 184, 0.14);
            --line-strong: rgba(96, 165, 250, 0.28);
            --text: #e5eefc;
            --muted: #8ea3c3;
            --soft: #c7d5ea;
            --brand: #4f8cff;
            --brand-strong: #2f6fe8;
            --success: #32c48d;
            --danger: #ff6b7a;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            font-family: 'Manrope', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(79, 140, 255, 0.18), transparent 28%),
                radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.12), transparent 26%),
                linear-gradient(145deg, #060914 0%, #0b1020 45%, #0e172b 100%);
            overflow: hidden;
        }

        a {
            color: #7cb8ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.22);
            border-radius: 999px;
        }

        .app-shell {
            height: 100vh;
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .topbar,
        .panel {
            border: 1px solid var(--line);
            background: var(--panel);
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow);
        }

        .topbar {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 14px;
            border-radius: 24px;
        }

        .brand {
            min-width: 220px;
            padding: 16px 18px;
            border-radius: 18px;
            background: linear-gradient(145deg, rgba(79, 140, 255, 0.18), rgba(79, 140, 255, 0.06));
            border: 1px solid rgba(79, 140, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-icon {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: linear-gradient(145deg, var(--brand), #72a7ff);
            box-shadow: 0 16px 30px rgba(79, 140, 255, 0.28);
            flex-shrink: 0;
        }

        .brand h1,
        .panel-head h2,
        .preview-top h2,
        .save-strip-head strong {
            font-size: 17px;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .brand p,
        .panel-head p,
        .preview-top span,
        .section-note,
        .save-strip-head span {
            margin-top: 3px;
            color: var(--muted);
            font-size: 12px;
        }

        .save-strip {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
        }

        .save-strip-head,
        .panel-head,
        .preview-top,
        .saved-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .saved-toggle {
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            user-select: none;
        }

        .saved-toggle:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .saved-toggle strong {
            font-size: 13px;
        }

        .saved-toggle span {
            color: var(--muted);
            font-size: 12px;
        }

        .saved-panel {
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .saved-panel.open {
            display: flex;
        }

        .save-grid,
        .row-two,
        .row-three {
            display: grid;
            gap: 10px;
        }

        .save-grid {
            grid-template-columns: minmax(180px, 240px) minmax(260px, 1fr) auto;
        }

        .row-two {
            grid-template-columns: 1fr 1fr;
        }

        .row-three {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .input,
        .textarea,
        .color-input {
            width: 100%;
            border: 1px solid transparent;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            font: 500 14px 'Manrope', sans-serif;
            outline: none;
            transition: 0.2s ease;
        }

        .input,
        .color-input {
            height: 48px;
            padding: 0 15px;
        }

        .textarea {
            min-height: 130px;
            resize: none;
            padding: 14px 15px;
            line-height: 1.55;
        }

        .color-input {
            padding: 6px;
            cursor: pointer;
        }

        .input::placeholder,
        .textarea::placeholder {
            color: #70829f;
        }

        .input:focus,
        .textarea:focus,
        .color-input:focus {
            border-color: var(--line-strong);
            background: rgba(255, 255, 255, 0.065);
            box-shadow: 0 0 0 4px rgba(79, 140, 255, 0.08);
        }

        .btn {
            height: 48px;
            padding: 0 18px;
            border: 0;
            border-radius: 16px;
            cursor: pointer;
            font: 700 13px 'Manrope', sans-serif;
            letter-spacing: 0.01em;
            transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            color: white;
            background: linear-gradient(145deg, var(--brand), var(--brand-strong));
        }

        .btn-soft {
            color: var(--soft);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-danger {
            color: #ffd5da;
            background: rgba(255, 107, 122, 0.1);
            border: 1px solid rgba(255, 107, 122, 0.22);
        }

        .saved-rows {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 2px;
        }

        .saved-card {
            min-width: 250px;
            max-width: 320px;
            padding: 12px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.045);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .saved-card-main {
            min-width: 0;
        }

        .saved-card-name {
            font-size: 13px;
            font-weight: 800;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .saved-card-url {
            margin-top: 3px;
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .saved-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .saved-actions .btn,
        .preview-button,
        .embed-remove {
            height: 38px;
            min-width: 38px;
            padding: 0 12px;
            border-radius: 12px;
            font-size: 12px;
        }

        .empty-state {
            padding: 18px;
            border-radius: 18px;
            border: 1px dashed rgba(148, 163, 184, 0.18);
            color: var(--muted);
            font-size: 13px;
            text-align: center;
            background: rgba(255, 255, 255, 0.025);
        }

        .content {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: 560px minmax(0, 1fr);
            gap: 18px;
        }

        .panel {
            min-height: 0;
            border-radius: 28px;
        }

        .controls {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 800;
            color: var(--muted);
        }

        .section-box {
            padding: 14px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .embed-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .embed-editor {
            padding: 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .embed-editor-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .embed-editor-top strong {
            font-size: 14px;
        }

        .embed-remove {
            border: 1px solid rgba(255, 107, 122, 0.22);
            background: rgba(255, 107, 122, 0.1);
            color: #ffd5da;
            cursor: pointer;
        }

        .send-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: auto;
        }

        .send-row .btn {
            min-width: 168px;
        }

        .status {
            min-height: 20px;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
        }

        .preview {
            position: relative;
            overflow: hidden;
            padding: 26px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.025), transparent),
                rgba(10, 16, 30, 0.78);
        }

        .preview::before,
        .preview::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            filter: blur(70px);
            opacity: 0.3;
            pointer-events: none;
        }

        .preview::before {
            width: 240px;
            height: 240px;
            top: -70px;
            right: -30px;
            background: rgba(79, 140, 255, 0.22);
        }

        .preview::after {
            width: 220px;
            height: 220px;
            bottom: -80px;
            left: -40px;
            background: rgba(34, 197, 94, 0.12);
        }

        .preview-stage {
            position: relative;
            z-index: 1;
            min-height: calc(100% - 56px);
            display: grid;
            place-items: center;
        }

        .message-card {
            width: min(760px, 100%);
            padding: 24px;
            border-radius: 24px;
            background: linear-gradient(180deg, rgba(49, 56, 77, 0.9), rgba(29, 35, 51, 0.94));
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.35);
            display: flex;
            gap: 16px;
            transform-style: preserve-3d;
            transition: transform 0.18s ease;
        }

        .avatar {
            width: 54px;
            height: 54px;
            flex-shrink: 0;
            border-radius: 18px;
            display: grid;
            place-items: center;
            overflow: hidden;
            background: linear-gradient(145deg, var(--brand), #77a8ff);
            box-shadow: 0 14px 24px rgba(79, 140, 255, 0.26);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .message-main {
            min-width: 0;
            flex: 1;
        }

        .message-head {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .message-name {
            font-size: 16px;
            font-weight: 800;
            color: #ffffff;
        }

        .badge {
            padding: 3px 7px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: rgba(79, 140, 255, 0.18);
            color: #bfdbfe;
        }

        .message-time {
            font-size: 12px;
            color: var(--muted);
        }

        .message-text,
        .embed-description {
            color: var(--soft);
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .mention {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 6px;
            background: rgba(88, 101, 242, 0.22);
            color: #c8d4ff;
            font-weight: 700;
        }

        .embed-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 14px;
        }

        .embed-card {
            padding: 14px 16px 12px;
            border-left: 4px solid #4f8cff;
            border-radius: 0 16px 16px 0;
            background: rgba(255, 255, 255, 0.045);
        }

        .embed-author {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffffff;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .embed-title {
            font-size: 16px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .embed-image {
            width: 100%;
            max-height: 260px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 12px;
            display: none;
            background: rgba(255, 255, 255, 0.04);
        }

        .embed-footer {
            margin-top: 10px;
            color: var(--muted);
            font-size: 12px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .button-row {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .preview-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            background: #5865f2;
            text-decoration: none;
            font-weight: 700;
            min-width: 90px;
        }

        @media (max-width: 1100px) {
            body {
                overflow: auto;
            }

            .app-shell {
                height: auto;
                min-height: 100vh;
            }

            .content {
                grid-template-columns: 1fr;
            }

            .topbar {
                flex-direction: column;
            }

            .save-grid,
            .row-two,
            .row-three,
            .send-row {
                grid-template-columns: 1fr;
                display: grid;
            }

            .send-row .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="24" height="24" viewBox="0 0 127.14 96.36" fill="white" aria-hidden="true">
                        <path
                            d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.14c2.64-27.38-4.51-51.11-19.32-72.1ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.2,46,96.09,53,91.08,65.69,84.69,65.69Z" />
                    </svg>
                </div>
                <div>
                    <h1>Webhook Manager</h1>
                    <p>Custom your own message</p>
                </div>
            </div>

            <section class="save-strip">
                <div class="save-strip-head">
                    <strong>Barre de sauvegarde</strong>
                    <span id="save-status">Prêt</span>
                </div>
                <div class="save-grid">
                    <input class="input" type="text" id="saveName" placeholder="Nom">
                    <input class="input" type="url" id="webhookUrl" placeholder="https://discord.com/api/webhooks/...">
                    <button class="btn btn-primary" id="btnSave">Sauver</button>
                </div>
                <div class="saved-toggle" id="savedToggle">
                    <strong>Webhooks sauvegardés</strong>
                    <span id="savedToggleText">Afficher</span>
                </div>
                <div class="saved-panel" id="savedPanel">
                    <div class="saved-rows" id="webhookList"></div>
                </div>
            </section>
        </header>

        <div class="content">
            <section class="panel controls">
                <div class="panel-head">
                    <div>
                        <h2>Composer</h2>
                        <p>Message, embeds, bouton</p>
                    </div>
                </div>

                <div class="row-two">
                    <div class="field">
                        <label for="username">Nom</label>
                        <input class="input" type="text" id="username" value="Webhook Builder">
                    </div>
                    <div class="field">
                        <label for="avatarUrl">Avatar URL</label>
                        <input class="input" type="url" id="avatarUrl" placeholder="https://...">
                    </div>
                </div>

                <div class="field">
                    <label for="messageContent">Message</label>
                    <textarea class="textarea" id="messageContent"
                        placeholder="Ex: @everyone ou [Test](https://example.com)"></textarea>
                </div>

                <div class="section-box">
                    <div class="panel-head">
                        <h2>Embeds</h2>
                        <button class="btn btn-primary" id="btnAddEmbed" type="button">+ Ajouter</button>
                    </div>
                    <span class="section-note">Click on "+ Ajouter" to add an embed</span>
                    <div class="embed-list" id="embedList"></div>
                </div>

                <div class="section-box">
                    <div class="panel-head">
                        <h2>Bouton</h2>
                        <span class="section-note">Cliquable</span>
                    </div>
                    <div class="row-two">
                        <div class="field">
                            <label for="buttonLabel">Texte</label>
                            <input class="input" type="text" id="buttonLabel" placeholder="Ouvrir">
                        </div>
                        <div class="field">
                            <label for="buttonUrl">URL</label>
                            <input class="input" type="url" id="buttonUrl" placeholder="https://...">
                        </div>
                    </div>
                </div>

                <div class="send-row">
                    <button class="btn btn-primary" id="btnSend">Envoyer</button>
                    <div class="status" id="status-msg"></div>
                </div>
            </section>

            <section class="panel preview">
                <div class="preview-top">
                    <div>
                        <h2>Aperçu</h2>
                        <span>Rendu final</span>
                    </div>
                    <span id="previewTime">Aujourd'hui à 12:00</span>
                </div>

                <div class="preview-stage" id="previewStage">
                    <article class="message-card" id="previewCard">
                        <div class="avatar">
                            <svg id="defaultAvatar" width="24" height="24" viewBox="0 0 127.14 96.36" fill="white"
                                aria-hidden="true">
                                <path
                                    d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.14c2.64-27.38-4.51-51.11-19.32-72.1ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.2,46,96.09,53,91.08,65.69,84.69,65.69Z" />
                            </svg>
                            <img id="customAvatar" src="" alt="">
                        </div>

                        <div class="message-main">
                            <div class="message-head">
                                <span class="message-name" id="previewName">Webhook Builder</span>
                                <span class="badge">BOT</span>
                                <span class="message-time" id="previewInlineTime">Maintenant</span>
                            </div>
                            <div class="message-text" id="previewMsg">Ton message apparaîtra ici.</div>
                            <div class="embed-stack" id="previewEmbeds"></div>
                            <div class="button-row" id="previewButtons"></div>
                        </div>
                    </article>
                </div>
            </section>
        </div>
    </div>

    <template id="embedTemplate">
        <div class="embed-editor">
            <div class="embed-editor-top">
                <strong class="embed-index">Embed</strong>
                <button class="embed-remove" type="button">Supprimer</button>
            </div>
            <div class="row-three">
                <div class="field">
                    <label>Title</label>
                    <input class="input" data-embed-field="title" type="text" placeholder="Titre">
                </div>
                <div class="field">
                    <label>URL</label>
                    <input class="input" data-embed-field="url" type="url" placeholder="https://...">
                </div>
                <div class="field">
                    <label>Couleur</label>
                    <input class="color-input" data-embed-field="color" type="color" value="#4f8cff">
                </div>
            </div>
            <div class="row-two">
                <div class="field">
                    <label>Author</label>
                    <input class="input" data-embed-field="author" type="text" placeholder="Auteur">
                </div>
                <div class="field">
                    <label>Time</label>
                    <input class="input" data-embed-field="time" type="datetime-local">
                </div>
            </div>
            <div class="row-two">
                <div class="field">
                    <label>URL Image</label>
                    <input class="input" data-embed-field="imageUrl" type="url" placeholder="https://...">
                </div>
                <div class="field">
                    <label>Footer</label>
                    <input class="input" data-embed-field="footer" type="text" placeholder="Footer">
                </div>
            </div>
            <div class="field">
                <label>Embed</label>
                <textarea class="textarea" data-embed-field="description"
                    placeholder="Description de l'embed"></textarea>
            </div>
        </div>
    </template>

    <script>
        const UI = {
            stage: document.getElementById('previewStage'),
            card: document.getElementById('previewCard'),
            time: document.getElementById('previewTime'),
            timeInline: document.getElementById('previewInlineTime'),
            savedToggle: document.getElementById('savedToggle'),
            savedToggleText: document.getElementById('savedToggleText'),
            savedPanel: document.getElementById('savedPanel'),
            embedList: document.getElementById('embedList'),
            embedTemplate: document.getElementById('embedTemplate'),
            inputs: {
                url: document.getElementById('webhookUrl'),
                user: document.getElementById('username'),
                avatar: document.getElementById('avatarUrl'),
                msg: document.getElementById('messageContent'),
                save: document.getElementById('saveName'),
                buttonLabel: document.getElementById('buttonLabel'),
                buttonUrl: document.getElementById('buttonUrl')
            },
            prev: {
                name: document.getElementById('previewName'),
                text: document.getElementById('previewMsg'),
                img: document.getElementById('customAvatar'),
                def: document.getElementById('defaultAvatar'),
                embeds: document.getElementById('previewEmbeds'),
                buttons: document.getElementById('previewButtons')
            },
            btns: {
                send: document.getElementById('btnSend'),
                save: document.getElementById('btnSave'),
                addEmbed: document.getElementById('btnAddEmbed')
            },
            status: document.getElementById('status-msg'),
            saveStatus: document.getElementById('save-status'),
            list: document.getElementById('webhookList')
        };

        function setText(element, text) {
            element.textContent = text;
        }

        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            setText(UI.time, `Aujourd'hui à ${time}`);
            setText(UI.timeInline, time);
        }

        function setStatus(message, type = 'muted') {
            const colors = { muted: 'var(--muted)', success: 'var(--success)', danger: 'var(--danger)' };
            setText(UI.status, message);
            UI.status.style.color = colors[type] || colors.muted;
        }

        function setSaveStatus(message, type = 'muted') {
            const colors = { muted: 'var(--muted)', success: 'var(--success)', danger: 'var(--danger)' };
            setText(UI.saveStatus, message);
            UI.saveStatus.style.color = colors[type] || colors.muted;
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function formatDiscordText(value) {
            let html = escapeHtml(value || '');
            html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            html = html.replace(/(^|[\s>])(@everyone|@here)\b/g, '$1<span class="mention">$2</span>');
            return html.replace(/\n/g, '<br>');
        }

        function formatPreviewTimestamp(value) {
            if (!value) return '';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '';
            return date.toLocaleString('fr-FR', {
                year: 'numeric',
                month: 'short',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function hexToDecimal(hex) {
            return parseInt(String(hex).replace('#', ''), 16);
        }

        function collectEmbedEditors() {
            return Array.from(UI.embedList.querySelectorAll('.embed-editor'));
        }

        function refreshEmbedTitles() {
            collectEmbedEditors().forEach((editor, index) => {
                setText(editor.querySelector('.embed-index'), `Embed ${index + 1}`);
            });
        }

        function createEmbedEditor() {
            const node = UI.embedTemplate.content.firstElementChild.cloneNode(true);
            node.querySelectorAll('[data-embed-field]').forEach((field) => {
                field.addEventListener('input', syncPreview);
            });
            node.querySelector('.embed-remove').addEventListener('click', () => {
                node.remove();
                refreshEmbedTitles();
                syncPreview();
            });
            UI.embedList.appendChild(node);
            refreshEmbedTitles();
            syncPreview();
        }

        function buildEmbeds() {
            return collectEmbedEditors().map((editor) => {
                const field = (name) => editor.querySelector(`[data-embed-field="${name}"]`).value.trim();
                const title = field('title');
                const url = field('url');
                const author = field('author');
                const timestamp = editor.querySelector('[data-embed-field="time"]').value;
                const imageUrl = field('imageUrl');
                const footer = field('footer');
                const description = field('description');
                const color = editor.querySelector('[data-embed-field="color"]').value;

                if (!title && !url && !author && !timestamp && !imageUrl && !footer && !description) {
                    return null;
                }

                const embed = { color: hexToDecimal(color) };
                if (title) embed.title = title;
                if (url) embed.url = url;
                if (description) embed.description = description;
                if (timestamp) embed.timestamp = new Date(timestamp).toISOString();
                if (author) embed.author = { name: author };
                if (footer) embed.footer = { text: footer };
                if (imageUrl) embed.image = { url: imageUrl };
                return embed;
            }).filter(Boolean);
        }

        function buildComponents() {
            const label = UI.inputs.buttonLabel.value.trim();
            const url = UI.inputs.buttonUrl.value.trim();
            if (!label || !url) return [];
            return [{
                type: 1,
                components: [{ type: 2, style: 5, label, url }]
            }];
        }

        function renderEmbedCard(embed) {
            const author = embed.author?.name ? `<div class="embed-author">${escapeHtml(embed.author.name)}</div>` : '';
            const title = embed.title
                ? `<div class="embed-title">${embed.url ? `<a href="${escapeHtml(embed.url)}" target="_blank">${escapeHtml(embed.title)}</a>` : escapeHtml(embed.title)}</div>`
                : '';
            const description = embed.description ? `<div class="embed-description">${formatDiscordText(embed.description)}</div>` : '';
            const image = embed.image?.url ? `<img class="embed-image" src="${escapeHtml(embed.image.url)}" alt="" style="display:block;">` : '';
            const footerParts = [];
            if (embed.footer?.text) footerParts.push(escapeHtml(embed.footer.text));
            if (embed.timestamp) footerParts.push(escapeHtml(formatPreviewTimestamp(embed.timestamp)));
            const footer = footerParts.length ? `<div class="embed-footer">${footerParts.join('<span>•</span>')}</div>` : '';
            const color = embed.color ? `#${embed.color.toString(16).padStart(6, '0')}` : '#4f8cff';
            return `<div class="embed-card" style="border-left-color:${color};">${author}${title}${description}${image}${footer}</div>`;
        }

        function renderButtons(components) {
            const links = [];
            components.forEach((row) => {
                (row.components || []).forEach((button) => {
                    links.push(`<a class="preview-button" href="${escapeHtml(button.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(button.label)}</a>`);
                });
            });
            return links.join('');
        }

        function applyWebhook(name, url) {
            UI.inputs.url.value = url;
            if (name && !UI.inputs.user.value.trim()) UI.inputs.user.value = name;
            syncPreview();
            setSaveStatus(`Chargé: ${name}`, 'success');
            setTimeout(() => setSaveStatus('Prêt'), 1600);
        }

        async function refreshLibrary() {
            if (!window.pywebview) return;
            const result = await window.pywebview.api.get_webhooks();
            UI.list.innerHTML = '';
            if (!result.success || !result.webhooks || result.webhooks.length === 0) {
                UI.list.innerHTML = '<div class="empty-state">Aucun webhook sauvegardé</div>';
                return;
            }
            result.webhooks.forEach((wh) => {
                const item = document.createElement('div');
                item.className = 'saved-card';
                item.innerHTML = `
                    <div class="saved-card-main">
                        <div class="saved-card-name">${escapeHtml(wh.name)}</div>
                        <div class="saved-card-url">${escapeHtml(wh.url)}</div>
                    </div>
                    <div class="saved-actions">
                        <button class="btn btn-soft" data-load="${escapeHtml(wh.name)}">Ouvrir</button>
                        <button class="btn btn-danger" data-delete="${escapeHtml(wh.name)}">X</button>
                    </div>
                `;
                item.querySelector('[data-load]').addEventListener('click', () => applyWebhook(wh.name, wh.url));
                item.querySelector('[data-delete]').addEventListener('click', () => deleteWebhook(wh.name));
                UI.list.appendChild(item);
            });
        }

        async function deleteWebhook(name) {
            const result = await window.pywebview.api.delete_webhook(name);
            setSaveStatus(result.success ? 'Supprimé' : (result.error || 'Erreur'), result.success ? 'success' : 'danger');
            refreshLibrary();
        }

        function syncPreview() {
            setText(UI.prev.name, UI.inputs.user.value.trim() || 'Webhook Builder');
            UI.prev.text.innerHTML = formatDiscordText(UI.inputs.msg.value.trim() || 'Ton message apparaîtra ici.');

            const avatarUrl = UI.inputs.avatar.value.trim();
            if (avatarUrl) {
                UI.prev.img.src = avatarUrl;
                UI.prev.img.style.display = 'block';
                UI.prev.def.style.display = 'none';
                UI.prev.img.onerror = () => {
                    UI.prev.img.style.display = 'none';
                    UI.prev.def.style.display = 'block';
                };
            } else {
                UI.prev.img.style.display = 'none';
                UI.prev.def.style.display = 'block';
            }

            const embeds = buildEmbeds();
            UI.prev.embeds.innerHTML = embeds.map(renderEmbedCard).join('');

            const components = buildComponents();
            UI.prev.buttons.innerHTML = renderButtons(components);
        }

        [UI.inputs.user, UI.inputs.avatar, UI.inputs.msg, UI.inputs.buttonLabel, UI.inputs.buttonUrl].forEach((input) => {
            input.addEventListener('input', syncPreview);
        });

        UI.savedToggle.addEventListener('click', async () => {
            const open = UI.savedPanel.classList.toggle('open');
            setText(UI.savedToggleText, open ? 'Masquer' : 'Afficher');
            if (open) await refreshLibrary();
        });

        UI.btns.addEmbed.addEventListener('click', createEmbedEditor);

        UI.btns.send.addEventListener('click', async () => {
            const webhookUrl = UI.inputs.url.value.trim();
            if (!webhookUrl) {
                setStatus('URL requise', 'danger');
                return;
            }
            setStatus('Envoi...', 'muted');
            const result = await window.pywebview.api.send_message({
                webhook_url: webhookUrl,
                username: UI.inputs.user.value,
                avatar_url: UI.inputs.avatar.value,
                content: UI.inputs.msg.value,
                embeds: buildEmbeds(),
                components: buildComponents()
            });
            setStatus(result.success ? 'Message envoyé' : result.error, result.success ? 'success' : 'danger');
        });

        UI.btns.save.addEventListener('click', async () => {
            const name = UI.inputs.save.value.trim();
            const url = UI.inputs.url.value.trim();
            if (!name || !url) {
                setSaveStatus('Nom + URL requis', 'danger');
                return;
            }
            const result = await window.pywebview.api.save_webhook({ name, url });
            setSaveStatus(result.success ? 'Sauvé' : (result.error || 'Erreur'), result.success ? 'success' : 'danger');
            if (result.success) {
                UI.inputs.save.value = '';
                if (UI.savedPanel.classList.contains('open')) {
                    refreshLibrary();
                }
            }
        });

        UI.stage.addEventListener('mousemove', (event) => {
            const rect = UI.stage.getBoundingClientRect();
            const offsetX = (event.clientX - rect.left) / rect.width;
            const offsetY = (event.clientY - rect.top) / rect.height;
            const rotateY = (offsetX - 0.5) * 10;
            const rotateX = (0.5 - offsetY) * 8;
            UI.card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        UI.stage.addEventListener('mouseleave', () => {
            UI.card.style.transform = 'rotateX(0deg) rotateY(0deg)';
        });

        updateClock();
        syncPreview();
        setInterval(updateClock, 30000);
    </script>
</body>

</html>
